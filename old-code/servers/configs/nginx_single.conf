# ============================================
# Cloudflare IP 白名单 - 获取真实客户端 IP
# ============================================
include /etc/nginx/conf.d/nginx_cloudflare_ips.inc;

# ============================================
# api.wforge.net - HTTP API 服务
# ============================================

server {
    listen 80;
    server_name api.wforge.net;
    
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.wforge.net;

    ssl_certificate /etc/nginx/ssl/api.wforge.net.crt;
    ssl_certificate_key /etc/nginx/ssl/api.wforge.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    location ^~ /pp-login/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, token' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            return 204;
        }

        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://cpp-server:31012/;
        
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Headers';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, token' always;
    }

    location ^~ /pp-admin/ {
