<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Warforge 下载</title>
	<style>
		:root {
			--bg-top: #13243a;
			--bg-bottom: #0a101a;
			--card-bg: rgba(255, 255, 255, 0.08);
			--text-main: #ffffff;
			--text-sub: rgba(255, 255, 255, 0.72);
			--btn-android: #36a852;
			--btn-ios: #1f7ae0;
			--btn-text: #ffffff;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
			color: var(--text-main);
			background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
		}

		body {
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.page {
			width: 100%;
			max-width: 720px;
			height: 100%;
			min-height: 100vh;
			padding: 32px 24px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 20px;
			position: relative;
		}

		.logo-wrap {
			width: 132px;
			height: 132px;
			border-radius: 28px;
			background: var(--card-bg);
			backdrop-filter: blur(5px);
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
		}

		.logo {
			width: 112px;
			height: 112px;
			object-fit: contain;
			border-radius: 22px;
		}

		.title {
			font-size: 34px;
			font-weight: 700;
			letter-spacing: 1px;
			text-align: center;
			text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
		}

		.footer {
			position: absolute;
			left: 24px;
			right: 24px;
			bottom: 32px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 50px;
			border-radius: 12px;
			color: var(--btn-text);
			text-decoration: none;
			font-size: 17px;
			font-weight: 600;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
			transition: transform 0.15s ease, filter 0.15s ease;
		}

		.btn:active {
			transform: translateY(1px) scale(0.995);
			filter: brightness(0.95);
		}

		.btn-android {
			background: var(--btn-android);
		}

		.btn-ios {
			background: var(--btn-ios);
		}

		.tips {
			margin-top: 2px;
			text-align: center;
			font-size: 12px;
			color: var(--text-sub);
			line-height: 1.4;
		}

		@media (min-width: 768px) {
			.footer {
				max-width: 440px;
				margin: 0 auto;
			}
		}
	</style>
</head>
<body>
	<main class="page">
		<div class="logo-wrap">
			<img class="logo" src="game-icon.png" alt="Warforge Icon" />
		</div>
		<h1 class="title">Warforge</h1>

		<div class="footer">
			<!-- TODO: 替换为 Android 安装包下载地址 -->
			<a class="btn btn-android" href="https://wforge.net/download/app.apk">Android 下载</a>

			<!-- TODO: 替换为 iOS manifest 链接，示例格式见下方 href -->
			<a
				class="btn btn-ios"
				href="itms-services://?action=download-manifest&url=https://wforge.net/download/ios/manifest.plist"
			>
				iOS 下载
			</a>
		</div>
	</main>
</body>
</html>
