<!DOCTYPE html>
<html lang="cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rTTiRUKnSWaDu2FjhzWFl8/JuUZMlplyWE/djenb2LoKqkgLGfEGfSrL7XDLoB1M" crossorigin="anonymous">
    <style>
        body {
            zoom: 0.7;
        }

        .sub {
            width: 320px;
            height: 700px;
        }


        .main-container {
            display: grid;
            grid-template-columns: repeat(8, 320px); /* 8 列，每列 320px */
            gap: 1px; /* 间隔为 1px */
        }
    </style>
</head>

<body>

    <div class="main-container">
        <iframe class="sub" src="http://localhost:7456/?guest=21001" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21002" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21003" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21004" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21005" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21006" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21007" frameborder="0"></iframe>
        <iframe class="sub" src="http://localhost:7456/?guest=21008" frameborder="0"></iframe>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Nj1D6pu2WnJojj+67GiU9ZFNwbl7bUWX5Kj5MS22C8bGjllemM9pvQyvj14zJb58"
        crossorigin="anonymous"></script>


    <script>
        let iframes = document.getElementsByTagName('iframe');
        let count = getQueryString('count') || 4;
        for (let i=0;i<8;i++) {
            let iframe = iframes[i];
			if(i>=count){
				iframe.style.display = 'none';
			}
        }
        function getQueryString(name) {
            const reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
            const urlObj = window.location;
            var r = urlObj.href.indexOf('#') > -1 ? urlObj.hash.split("?")[1].match(reg) : urlObj.search.substr(1).match(reg);
            if (r != null) {
                return unescape(r[2]);
            }
            return null;
        }
    </script>
</body>

</html>
